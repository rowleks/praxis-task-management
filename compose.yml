services:
  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    container_name: reverse-proxy
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    container_name: praxis_frontend
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    restart: unless-stopped

  backend:
    container_name: praxis_backend
    build:
      context: ./backend
    environment:
      - DB_URI=mongodb://the_username:the_password@mongo:27017/the_database?authSource=the_database
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:latest
    container_name: praxis_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_INITDB_DATABASE=the_database
    volumes:
      - praxis_prod_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - praxis_prod_redis_data:/data
    restart: unless-stopped

volumes:
  praxis_prod_mongo_data:
  praxis_prod_redis_data:
